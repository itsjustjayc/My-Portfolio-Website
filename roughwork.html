<header class=" sticky top-0 w-full py-4 z-20 bg-[#0a0a1a] text-gray-50">
  <div class="mx-auto flex justify-between items-center px-6 xl:px-4">

        <div class="flex items-center gap-4">
          <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode">
            <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 3.1a1 1 0 0 1 1 1V6a1 1 0 1 1-2 0V4.1a1 1 0 0 1 1-1Zm7.07 3.03a1 1 0 0 1 1.41 1.41L19.07 9a1 1 0 1 1-1.41-1.41l1.41-1.46ZM21 11a1 1 0 1 1 0 2h-1.9a1 1 0 1 1 0-2H21Zm-9 6a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm5.66 2.34A1 1 0 1 1 16.24 19l1.43-1.43a1 1 0 1 1 1.41 1.41L17.66 19.34ZM12 18a1 1 0 0 1 1 1v1.9a1 1 0 1 1-2 0V19a1 1 0 0 1 1-1Zm-7.07-3.03a1 1 0 1 1 1.41-1.41L7.76 15a1 1 0 1 1-1.41 1.41L4.93 14.97ZM3 11h1.9a1 1 0 1 1 0 2H3a1 1 0 1 1 0-2Zm1.93-4.9A1 1 0 1 1 6.34 7.5L4.93 8.9A1 1 0 1 1 3.52 7.5l1.41-1.4Z"/>
            </svg>
          </button>

</header>
<script>
  const toggleButton = document.getElementById('theme-toggle');
  const body = document.body;

  // On page load: restore the last saved theme
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') {
    body.classList.add('dark');
  } else {
    body.classList.remove('dark');
  }

  // Toggle theme and save preference
  toggleButton.addEventListener('click', () => {
    body.classList.toggle('dark');

    // Save the current theme to localStorage
    if (body.classList.contains('dark')) {
      localStorage.setItem('theme', 'dark');
    } else {
      localStorage.setItem('theme', 'light');
    }
  });

</script>
